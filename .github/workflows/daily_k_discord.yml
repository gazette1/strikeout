name: Daily K Picks to Discord

on:
  schedule:
    # 13:00 UTC ≈ 9:00 AM ET during the season. Runs daily; the script self-skips
    # on days with no MLB games, so it only posts on game days.
    - cron: '0 13 * * *'
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

concurrency:
  group: daily-k-picks
  cancel-in-progress: false

jobs:
  picks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4      # includes the committed model + state snapshot

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pybaseball MLB-StatsAPI lightgbm scikit-learn pandas pyarrow numpy requests

      - name: Restore picks/results history (to grade yesterday)
        uses: actions/cache@v4
        with:
          path: data/predictions
          key: predictions-${{ github.run_id }}
          restore-keys: |
            predictions-

      - name: Grade yesterday's picks, then post today's
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUTF8: '1'
        run: |
          python tools/results.py || true   # grade yesterday (skips if none saved)
          python tools/daily_picks.py        # post today's picks (uses committed snapshot)
