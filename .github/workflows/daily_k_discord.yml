name: Daily K Picks to Discord

on:
  schedule:
    # 13:00 UTC ≈ 9:00 AM ET during the season. Runs daily; the script self-skips
    # on days with no MLB games, so it only posts on game days.
    - cron: '0 13 * * *'
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

concurrency:
  group: daily-k-picks
  cancel-in-progress: false

permissions:
  contents: write              # allow committing the updated picks/results back

jobs:
  picks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5      # includes committed model, snapshot, and results log

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Grade yesterday's picks, then post today's
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONUTF8: '1'
        run: |
          python tools/results.py || true   # grade yesterday (skips if none saved)
          python tools/daily_picks.py        # post today's picks (live odds if ODDS_API_KEY set)

      - name: Persist picks + results back to the repo
        if: always()
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data/predictions
          git commit -m "Update picks/results $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          git pull --rebase --autostash origin main || true
          git push || true
